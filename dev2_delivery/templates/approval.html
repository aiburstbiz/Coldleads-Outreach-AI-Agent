<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Review Outreach — {{ job.company_name }}</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #0f0f1a; color: #e0e0e0; padding: 40px; }
    h1 { color: #7c3aed; margin-bottom: 6px; }
    .meta { color: #888; font-size: 13px; margin-bottom: 30px; }
    .card { background: #1e1e2e; border-radius: 8px; padding: 24px; margin-bottom: 24px; }
    .card h2 { font-size: 14px; text-transform: uppercase; color: #7c3aed; margin-bottom: 12px; }
    .status { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; text-transform: uppercase; }
    .status.pending  { background: #3a3a00; color: #ffd700; }
    .status.approved { background: #003a00; color: #00ff88; }
    .status.rejected { background: #3a0000; color: #ff4444; }
    .status.sent     { background: #003a3a; color: #00cfff; }
    label { display: block; font-size: 13px; color: #aaa; margin-bottom: 6px; margin-top: 16px; }
    input[type=text], textarea {
      width: 100%; padding: 10px; background: #2a2a3e; border: 1px solid #444;
      border-radius: 6px; color: #e0e0e0; font-size: 14px;
    }
    textarea { height: 260px; resize: vertical; font-family: Arial, sans-serif; }
    .actions { display: flex; gap: 12px; margin-top: 16px; }
    button {
      padding: 10px 28px; border: none; border-radius: 6px;
      font-size: 14px; font-weight: bold; cursor: pointer;
    }
    .btn-approve { background: #7c3aed; color: #fff; }
    .btn-approve:hover { background: #6d28d9; }
    .btn-reject  { background: #3a0000; color: #ff4444; border: 1px solid #ff4444; }
    .btn-reject:hover { background: #550000; }
    .ppt-link { color: #7c3aed; text-decoration: none; font-size: 14px; }
    .ppt-link:hover { text-decoration: underline; }
    .flash { padding: 12px 20px; border-radius: 6px; margin-bottom: 20px; font-size: 14px; }
    .flash.success { background: #003a00; color: #00ff88; }
    .flash.error   { background: #3a0000; color: #ff4444; }
  </style>
</head>
<body>

  <h1>{{ job.company_name }}</h1>
  <p class="meta">
    Job ID: {{ job.job_id }} &nbsp;|&nbsp;
    Status: <span class="status {{ job.status }}">{{ job.status }}</span>
  </p>

  {% if flash %}
  <div class="flash {{ flash.type }}">{{ flash.message }}</div>
  {% endif %}

  <!-- PPT Download -->
  <div class="card">
    <h2>Generated Presentation</h2>
    <a class="ppt-link" href="/download/{{ job.job_id }}">
      ⬇ Download {{ job.company_name }}.pptx
    </a>
  </div>

  <!-- Email Review -->
  <div class="card">
    <h2>Outreach Email Draft</h2>

    {% if job.status in ["pending", "rejected"] %}
    <form method="post" action="/approve/{{ job.job_id }}">
      <label>To</label>
      <input type="text" name="recipient_email"
             value="hansini2015@gmail.com">

      <label>Subject</label>
      <input type="text" name="subject"
             value="{{ job.email_draft.subject }}">

      <label>Body (HTML)</label>
      <textarea name="body">{{ job.email_draft.body }}</textarea>

      <div class="actions">
        <button class="btn-approve" type="submit">Approve &amp; Send</button>
      </div>
    </form>

    <form method="post" action="/reject/{{ job.job_id }}" style="margin-top:12px;">
      <div class="actions">
        <button class="btn-reject" type="submit">Reject</button>
      </div>
    </form>

    {% else %}
    <label>To</label>
    <input type="text" value="{{ job.email_draft.recipient_email }}" disabled>
    <label>Subject</label>
    <input type="text" value="{{ job.email_draft.subject }}" disabled>
    <label>Body</label>
    <textarea disabled>{{ job.email_draft.body }}</textarea>
    {% endif %}
  </div>

</body>
</html>
